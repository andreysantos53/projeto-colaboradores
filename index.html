<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Colaboradores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cadastro de Colaboradores</h1>

<form id="form">
  <input placeholder="Nome" id="nome">
  <input placeholder="Idade" id="idade">
  <input placeholder="Cargo" id="cargo">
  <input placeholder="Salário" id="salario">
  <input placeholder="Tempo empresa" id="tempo">
  <input type="date" id="data">
  <input placeholder="Setor" id="setor">
  <input placeholder="Status" id="status">
  <button>Cadastrar</button>
</form>

<h2>Lista</h2>
<div id="lista"></div>

<footer>
Sistema de Gestão de Colaboradores © 2026  
Desenvolvido por Equipe
</footer>

<script src="script.js"></script>

</body>
</html>
